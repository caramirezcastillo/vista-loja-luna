<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Conexão Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Teste de Conexão Supabase - Moda Agora Store</h1>
    
    <div id="results"></div>
    
    <button onclick="testConnection()">🔗 Testar Conexão</button>
    <button onclick="checkUsersTable()">👥 Verificar Tabela Users</button>
    <button onclick="testUserRegistration()">📝 Testar Registro</button>
    <button onclick="checkAuthUsers()">🔐 Verificar Auth Users</button>
    <button onclick="clearResults()">🧹 Limpar</button>

    <script>
        const SUPABASE_URL = "https://ruqiuqfjjmavcmkciodx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1cWl1cWZqam1hdmNta2Npb2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg0NDU2OTksImV4cCI6MjA3NDAyMTY5OX0.phJu4tCQEs0kJeFDA3fc7g8jPPbztXgXlBRJJgjZCnY";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testConnection() {
            addResult('🔄 Testando conexão com Supabase...', 'info');
            
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('count', { count: 'exact', head: true });
                
                if (error) {
                    addResult(`❌ Erro na conexão: ${error.message}`, 'error');
                    addResult(`<pre>${JSON.stringify(error, null, 2)}</pre>`, 'error');
                } else {
                    addResult('✅ Conexão com Supabase estabelecida com sucesso!', 'success');
                    addResult(`📊 Total de usuários na tabela: ${data || 0}`, 'success');
                }
            } catch (err) {
                addResult(`💥 Erro inesperado: ${err.message}`, 'error');
            }
        }
        
        async function checkUsersTable() {
            addResult('🔄 Verificando estrutura da tabela users...', 'info');
            
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .limit(5);
                
                if (error) {
                    addResult(`❌ Erro ao acessar tabela users: ${error.message}`, 'error');
                    addResult(`<pre>${JSON.stringify(error, null, 2)}</pre>`, 'error');
                } else {
                    addResult(`✅ Tabela users acessível! Encontrados ${data.length} usuários`, 'success');
                    if (data.length > 0) {
                        addResult(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'info');
                    } else {
                        addResult('📝 Tabela users está vazia', 'info');
                    }
                }
            } catch (err) {
                addResult(`💥 Erro inesperado: ${err.message}`, 'error');
            }
        }
        
        async function testUserRegistration() {
            const testEmail = `test_${Date.now()}@example.com`;
            const testPassword = 'test123456';
            
            addResult(`🔄 Testando registro de usuário: ${testEmail}`, 'info');
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: testEmail,
                    password: testPassword,
                    options: {
                        data: {
                            full_name: 'Usuário Teste'
                        }
                    }
                });
                
                if (error) {
                    addResult(`❌ Erro no registro: ${error.message}`, 'error');
                } else {
                    addResult('✅ Usuário registrado no Auth com sucesso!', 'success');
                    addResult(`👤 ID do usuário: ${data.user?.id}`, 'info');
                    
                    // Aguardar um pouco para o trigger executar
                    setTimeout(async () => {
                        await checkUsersTable();
                    }, 2000);
                }
            } catch (err) {
                addResult(`💥 Erro inesperado: ${err.message}`, 'error');
            }
        }
        
        async function checkAuthUsers() {
            addResult('🔄 Verificando usuários autenticados...', 'info');
            
            try {
                const { data: { user } } = await supabase.auth.getUser();
                
                if (user) {
                    addResult('✅ Usuário autenticado encontrado!', 'success');
                    addResult(`<pre>${JSON.stringify(user, null, 2)}</pre>`, 'info');
                } else {
                    addResult('ℹ️ Nenhum usuário autenticado no momento', 'info');
                }
                
                // Verificar sessão
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    addResult('✅ Sessão ativa encontrada!', 'success');
                } else {
                    addResult('ℹ️ Nenhuma sessão ativa', 'info');
                }
            } catch (err) {
                addResult(`💥 Erro inesperado: ${err.message}`, 'error');
            }
        }
        
        // Testar conexão automaticamente ao carregar
        window.onload = () => {
            addResult('🚀 Página de teste carregada. Clique nos botões para testar!', 'info');
        };
    </script>
</body>
</html>
